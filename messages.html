<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha Web Platform - Özel Mesajlar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="top-navigation-bar">
        <div class="nav-links-left">
            <a href="feed.html" class="nav-icon-link"><i class="fa-solid fa-house"></i></a>
            <a href="messages.html" class="nav-icon-link" style="color: var(--btn-primary);"><i class="fa-solid fa-paper-plane"></i></a>
            <a href="profile.html" class="nav-icon-link"><i class="fa-solid fa-user"></i></a>
            <a href="admin.html" id="navAdminLink" class="nav-icon-link" style="display: none;"><i class="fa-solid fa-lock"></i></a>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="theme-toggle-corner" onclick="toggleThemeOnly()" style="position: static;">🌙</button>
            <button onclick="handleLogout()" style="background: none; border: none; color: var(--btn-danger); cursor: pointer; font-size: 1.1rem;"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <div class="container dm-layout">
        
        <div class="dm-user-list" id="activeUsersContainer">
            </div>

        <div id="chatHeader" style="text-align: left; font-size: 0.95rem; font-weight: 600; padding: 5px 0 10px 0; border-bottom: 1px solid var(--border-subcard); color: var(--text-sub);">
            Lütfen mesajlaşmak için yukarıdan bir kullanıcı seçin.
        </div>

        <div class="chat-messages-box" id="chatMessagesBox">
            <div style="margin: auto; color: var(--text-sub); font-size: 0.85rem; text-align: center;">
                <i class="fa-regular fa-comments" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                Sohbet Odası Hazır
            </div>
        </div>

        <div class="chat-input-bar" id="chatInputBar" style="display: none;">
            <input type="file" id="chatMediaInput" accept="image/*,video/*" style="display: none;" onchange="uploadChatMedia()">
            <button onclick="document.getElementById('chatMediaInput').click()" style="background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; padding: 5px;">
                <i class="fa-solid fa-circle-plus" id="chatMediaIcon"></i>
            </button>
            
            <input type="text" class="chat-input-field" id="chatMessageField" placeholder="Mesajını yaz..." onkeypress="if(event.key === 'Enter') sendTextMessage()">
            
            <button onclick="sendTextMessage()" style="background: none; border: none; color: var(--btn-primary); font-size: 1.2rem; cursor: pointer; padding: 5px;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://chat-ee35e-default-rtdb.europe-west1.firebasedatabase.app/",
            storageBucket: "chat-ee35e.appspot.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const database = firebase.database();
        const storage = firebase.storage();

        const currentUserEmail = sessionStorage.getItem('active_user_email');
        const currentUserName = sessionStorage.getItem('active_user_name');
        const cleanUserEmail = currentUserEmail ? currentUserEmail.toLowerCase().replace('.', '_') : null;

        let selectedUserEmail = null;
        let activeRoomId = null;

        if(!currentUserEmail) window.location.href = 'index.html';

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Admin kontrolü
            if(cleanUserEmail) {
                database.ref(`users/${cleanUserEmail}`).once('value', snap => {
                    if(snap.exists() && snap.val().role === 'admin') {
                        document.getElementById('navAdminLink').style.display = 'block';
                    }
                });
            }
            
            loadUserList();
        });

        function toggleThemeOnly() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            document.querySelector('.theme-toggle-corner').textContent = (newTheme === 'light') ? '☀️' : '🌙';
        }

        function handleLogout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // SİSTEMDEKİ DİĞER ÜYELERİ LİSTELEME
        function loadUserList() {
            database.ref('users').on('value', snapshot => {
                const container = document.getElementById('activeUsersContainer');
                container.innerHTML = "";

                snapshot.forEach(child => {
                    const userData = child.val();
                    // Kendimizi listede göstermiyoruz
                    if(userData.email === currentUserEmail) return;

                    const userTab = document.createElement('div');
                    userTab.className = 'dm-user-tab';
                    userTab.onclick = () => selectUserChat(userData.email, userData.username);

                    const avatarSrc = userData.avatar ? userData.avatar : '58873-milkbear.gif';

                    userTab.innerHTML = `
                        <img src="${avatarSrc}" class="dm-user-avatar" alt="Avatar">
                        <div class="dm-user-name">${userData.username}</div>
                    `;
                    container.appendChild(userTab);
                });
            });
        }

        // BİR KULLANICI SEÇİLDİĞİNDE SOHBET ODASINI AÇMA
        function selectUserChat(targetEmail, targetName) {
            selectedUserEmail = targetEmail;
            
            // Tüm sekmelerden aktifliği kaldır ve seçilene ekle
            document.querySelectorAll('.dm-user-tab').forEach(tab => tab.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('chatHeader').textContent = `${targetName} ile Sohbet`;
            document.getElementById('chatInputBar').style.display = 'flex';

            // Benzersiz Oda ID'si üretme (Alfabetik sıralama ile iki kullanıcı için de aynı oda açılır)
            const sortedEmails = [currentUserEmail, targetEmail].sort();
            activeRoomId = sortedEmails[0].replace(/\./g, '_') + "_CHATS_" + sortedEmails[1].replace(/\./g, '_');

            listenChatRoom();
        }

        // SOHBET ODASINI CANLI DİNLEME
        function listenChatRoom() {
            database.ref(`messages/${activeRoomId}`).on('value', snapshot => {
                const msgBox = document.getElementById('chatMessagesBox');
                msgBox.innerHTML = "";

                if(!snapshot.exists()) {
                    msgBox.innerHTML = `<div style="margin: auto; color: var(--text-sub); font-size: 0.85rem;">Mesaj bulunmuyor. İlk mesajı siz gönderin!</div>`;
                    return;
                }

                snapshot.forEach(child => {
                    const msg = child.val();
                    const msgId = child.key;
                    
                    const bubble = document.createElement('div');
                    const isMine = msg.sender === currentUserEmail;
                    
                    bubble.className = `msg-bubble ${isMine ? 'msg-outgoing' : 'msg-incoming'}`;

                    let contentHtml = "";
                    if(msg.type === 'video') {
                        contentHtml = `<video src="${msg.mediaUrl}" controls style="width:100%; border-radius:12px; max-height:180px; display:block;"></video>`;
                    } else if(msg.type === 'image') {
                        contentHtml = `<img src="${msg.mediaUrl}" style="width:100%; border-radius:12px; max-height:180px; object-fit:cover; display:block;">`;
                    } else {
                        contentHtml = `<div>${msg.text}</div>`;
                    }

                    // Kullanıcı yazan kişi ise veya admin ise üstüne çift tıklandığında silme opsiyonu sunar
                    if(isMine || currentUserName.toLowerCase() === 'admin') {
                        bubble.style.cursor = "pointer";
                        bubble.title = "Silmek için tıklayın";
                        bubble.onclick = () => deleteChatMessage(msgId, msg.mediaUrl);
                    }

                    bubble.innerHTML = contentHtml;
                    msgBox.appendChild(bubble);
                });

                // Otomatik olarak en alt mesaja kaydır
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        // METİN MESAJI GÖNDERME
        function sendTextMessage() {
            const txtField = document.getElementById('chatMessageField');
            const text = txtField.value.trim();
            if(!text || !activeRoomId) return;

            const msgData = {
                sender: currentUserEmail,
                text: text,
                type: "text",
                timestamp: Date.now()
            };

            database.ref(`messages/${activeRoomId}`).push(msgData).then(() => {
                txtField.value = "";
            });
        }

        // MEDYA (FOTOĞRAF / VİDEO) MESAJI GÖNDERME SİSTEMİ
        function uploadChatMedia() {
            const file = document.getElementById('chatMediaInput').files[0];
            const icon = document.getElementById('chatMediaIcon');
            if(!file || !activeRoomId) return;

            icon.className = "fa-solid fa-spinner fa-spin"; // Yükleme animasyonu

            const fileRef = storage.ref(`chats/${activeRoomId}/${Date.now()}_${file.name}`);
            fileRef.put(file).then(snapshot => {
                snapshot.ref.getDownloadURL().then(downloadURL => {
                    const msgData = {
                        sender: currentUserEmail,
                        mediaUrl: downloadURL,
                        type: file.type.startsWith('video') ? 'video' : 'image',
                        timestamp: Date.now()
                    };

                    database.ref(`messages/${activeRoomId}`).push(msgData).then(() => {
                        icon.className = "fa-solid fa-circle-plus";
                        document.getElementById('chatMediaInput').value = "";
                    });
                });
            }).catch(err => {
                alert("Yükleme hatası: " + err.message);
                icon.className = "fa-solid fa-circle-plus";
            });
        }

        // MESAJ SİLME MOTORU
        function deleteChatMessage(msgId, mediaUrl) {
            if(confirm("Bu mesajı sohbetten tamamen silmek istiyor musunuz?")) {
                if(mediaUrl) {
                    storage.refFromURL(mediaUrl).delete().catch(e => console.log("Dosya zaten temizlenmiş."));
                }
                database.ref(`messages/${activeRoomId}/${msgId}`).remove();
            }
        }
    </script>
</body>
</html>
