<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha Web Platform - Sözleşme Onayı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="verifyVideoContainer">
        <div class="controls-corner">
            <button class="theme-toggle-corner" onclick="toggleThemeOnly()">🌙</button>
        </div>

        <h1 id="verifyPageTitle" style="margin-bottom: 15px;">Platform Sözleşmesi</h1>
        
        <div class="hero-description" style="text-align: left; background: var(--comment-box-bg); padding: 15px; border-radius: 15px; max-height: 120px; overflow-y: auto; border: 1px solid var(--border-subcard); font-size: 0.85rem;">
            <strong>Topluluk Kuralları:</strong><br>
            1. Diğer üyelere karşı saygılı ve dürüst olun.<br>
            2. Genel akışta veya özel mesajlarda telif hakkı içeren, yasa dışı veya uygunsuz video/fotoğraf paylaşımı kesinlikle yasaktır.<br>
            3. Kurallara uymayan hesaplar <strong>Admin</strong> tarafından tamamen silinecektir.
        </div>

        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0;">
            <input type="checkbox" id="chkAgree" style="width: 18px; height: 18px; cursor: pointer;" onchange="checkAgreement()">
            <label for="chkAgree" style="margin: 0; font-size: 0.9rem; cursor: pointer;">Okudum, kuralları onaylıyorum.</label>
        </div>

        <div id="videoWrapper" style="display: none; position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 20px;">
            <video id="rulesVideo" src="Onay_videosu.mp4.mov" style="width: 100%; display: block;" playsinline></video>
            
            <button id="btnMuteToggle" onclick="toggleVideoMute()" style="position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); border: none; color: #fff; padding: 10px 14px; border-radius: 50%; cursor: pointer; font-size: 1rem; z-index: 10;">
                <i class="fa-solid fa-volume-xmark"></i>
            </button>
        </div>

        <button class="btn btn-secondary" id="btnContinueFeed" onclick="goToFeedPage()" disabled style="opacity: 0.5; cursor: not-allowed;">
            Sitede Devam Et <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script>
        // Oturum kontrolü: Giriş yapmamış kullanıcıyı kapıya geri fırlat
        const sessionUser = sessionStorage.getItem('active_user_email');
        if(!sessionUser) {
            window.location.href = 'index.html';
        }

        const video = document.getElementById('rulesVideo');
        const muteBtn = document.getElementById('btnMuteToggle');
        const continueBtn = document.getElementById('btnContinueFeed');

        // Sayfa yüklendiğinde yerel temayı uygula
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });

        function toggleThemeOnly() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            document.querySelector('.theme-toggle-corner').textContent = (newTheme === 'light') ? '☀️' : '🌙';
        }

        // Onay kutusu işaretlendiğinde videoyu başlat
        function checkAgreement() {
            const isChecked = document.getElementById('chkAgree').checked;
            const wrapper = document.getElementById('videoWrapper');

            if (isChecked) {
                wrapper.style.display = 'block';
                video.muted = true; // Tarayıcı engeline takılmamak için başta sessiz başlatıyoruz
                video.play().catch(err => console.log("Video otomatik oynatılamadı:", err));
            } else {
                wrapper.style.display = 'none';
                video.pause();
                video.currentTime = 0;
                continueBtn.disabled = true;
                continueBtn.style.opacity = "0.5";
                continueBtn.style.cursor = "not-allowed";
            }
        }

        // Ses Aç / Kapat Fonksiyonu
        function toggleVideoMute() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            } else {
                video.muted = true;
                muteBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
            }
        }

        // Video tamamen bittiğinde "Devam Et" butonunu aktifleştir
        video.onended = function() {
            continueBtn.disabled = false;
            continueBtn.style.opacity = "1";
            continueBtn.style.cursor = "pointer";
            continueBtn.classList.remove('btn-secondary');
            continueBtn.classList.add('btn-primary');
            
            // Otomatik geçiş istersen burayı aktif edebilirsin:
            // goToFeedPage();
        };

        function goToFeedPage() {
            window.location.href = 'feed.html';
        }
    </script>
</body>
</html>
