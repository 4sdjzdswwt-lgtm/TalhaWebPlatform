<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeXT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* KARANLIK MOD — Instagram OLED gece teması */
  --bg:#000000; --surface:#121212; --surface-2:#1a1a1a; --line:#262626;
  --accent:#0095f6; --accent-dim:#00375f; --warn:#f2b33d; --danger:#ed4956;
  --text:#f5f5f5; --muted:#737373; --bubble-me:#0095f6;
  --like-color:#ed4956;
  --glass-bg:rgba(18,18,18,.62); --glass-border:rgba(255,255,255,.08);
}
body.light-mode{
  /* AYDINLIK MOD — Instagram beyaz teması */
  --bg:#ffffff; --surface:#ffffff; --surface-2:#efefef; --line:#dbdbdb;
  --accent:#0095f6; --accent-dim:#00376b; --warn:#b9790a; --danger:#ed4956;
  --text:#262626;
  --muted:#737373; --bubble-me:#0095f6;
  --like-color:#ed4956;
  --glass-bg:rgba(255,255,255,.66); --glass-border:rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden;}
html,body{scroll-behavior:smooth;}
*{-webkit-overflow-scrolling:touch;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:background-color .3s ease, color .3s ease;}
*{transition:background-color .25s ease, border-color .25s ease, color .25s ease;}
.btn{padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-primary{background:var(--accent);color:#06140d;}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
.row{display:flex;gap:10px;}
.row .btn{flex:1;width:auto;}
input[type=text],input[type=email],input[type=password]{
  width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  padding:12px 13px;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif;
}
input:focus{border-color:var(--accent);}
.hidden{display:none !important;}

/* ===== APP SHELL ===== */
#appShell{display:flex;max-width:1000px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;}
#sidebar{
  width:210px;flex-shrink:0;border-right:1px solid var(--line);padding:20px 14px;
  position:sticky;top:0;height:100vh;
}
#sidebar .logo{display:flex;align-items:center;gap:8px;margin-bottom:26px;padding:0 6px;}
#sidebar .mark{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:13px;border:1px solid var(--accent-dim);padding:3px 7px;border-radius:6px;}
#sidebar .logo span{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;}
#sidebar .nav a{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:4px;cursor:pointer;}
#sidebar .nav a.active{background:var(--surface-2);color:var(--accent);}
#sidebar .nav a svg{width:17px;height:17px;flex-shrink:0;}
#sidebar .who{display:flex;align-items:center;gap:9px;margin-top:24px;padding:10px;border-top:1px solid var(--line);}
#sidebar .who img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(--line);}
#sidebar .who span{font-size:12.5px;font-weight:600;}

#main{flex:1;min-width:0;position:relative;height:100dvh;overflow:hidden;}

/* ALT ADA (PILL) NAVİGASYON */
.island{
  position:absolute;left:50%;bottom:25px;transform:translateX(-50%);
  display:flex;gap:6px;padding:9px;border-radius:38px;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  box-shadow:0 8px 28px rgba(0,0,0,.25);
  z-index:9999;align-self:center;
}
.island button{
  width:54px;height:54px;border-radius:50%;border:none;background:transparent;
  color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;
  transform:scale(.88);transition:transform .25s ease, color .2s ease, background .2s ease;
}
.island button svg{width:24px;height:24px;}
.island button.active{color:var(--accent);background:rgba(0,149,246,.16);transform:scale(1.05);}
.island button.pulse{animation:islandPulse .32s ease;}
.island.chat-fullscreen-hide{display:none;}
@keyframes islandPulse{0%{transform:scale(1.05);}45%{transform:scale(1.28);}100%{transform:scale(1.05);}}

/* BIO / PROFİL EKRANI */
.profileWrap{max-width:420px;margin:0 auto;padding:32px 22px 40px;text-align:center;}
.profileWrap .avatarBig{width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-dim);margin-bottom:14px;}
.profileWrap h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:0 0 4px;}
.profileWrap .uemail{font-size:12px;color:var(--muted);margin-bottom:18px;}

.statsRow{display:flex;justify-content:center;gap:0;margin-bottom:22px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;}
.statItem{flex:1;text-align:center;border-right:1px solid var(--line);}
.statItem:last-child{border-right:none;}
.statNum{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;}
.statLbl{font-size:11px;color:var(--muted);margin-top:2px;}
.profileWrap textarea{
  width:100%;min-height:80px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  border-radius:12px;padding:12px;font-size:13.5px;font-family:'Inter',sans-serif;resize:vertical;outline:none;margin-bottom:12px;
}
.profileWrap textarea:focus{border-color:var(--accent);}
.gridThumb{aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:var(--surface-2);}
.gridThumb img{width:100%;height:100%;object-fit:cover;display:block;}

/* ===== ORTAK MODÜL: FOTOĞRAF KIRPMA EKRANI ===== */
.crop-topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--line);
}
.crop-text-btn{background:none;border:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;padding:6px 4px;}
.crop-done{color:var(--accent);font-weight:700;}
.crop-title{font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:var(--text);}
.crop-stage{
  flex:1;min-height:0;position:relative;overflow:hidden;background:#000;
  display:flex;align-items:center;justify-content:center;touch-action:none;
}
#cropImage{position:absolute;top:50%;left:50%;will-change:transform;user-select:none;-webkit-user-drag:none;}
.crop-circle-mask{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:280px;height:280px;max-width:78vw;max-height:78vw;border-radius:50%;
  box-shadow:0 0 0 9999px rgba(0,0,0,.62);
  border:2px solid rgba(255,255,255,.85);pointer-events:none;
}
.crop-controls{flex-shrink:0;background:var(--surface);border-top:1px solid var(--line);padding:14px 20px 22px;}
.crop-rotate-btn{
  display:flex;align-items:center;gap:7px;margin:0 auto 16px;background:var(--surface-2);
  border:1px solid var(--line);color:var(--text);border-radius:20px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;
}
.crop-rotate-btn svg{width:16px;height:16px;}
.crop-slider-row{margin-bottom:12px;}
.crop-slider-row label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;}
.crop-slider-row input[type=range]{width:100%;accent-color:var(--accent);}

/* ===== REGISTER SCREEN ===== */
.card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
.head{padding:22px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.head .mark{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:13px;border:1px solid var(--accent-dim);padding:3px 7px;border-radius:6px;}
.head h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin:0;}
.rail{display:flex;gap:6px;padding:18px 24px 0;}
.rail .seg{flex:1;height:3px;border-radius:3px;background:var(--line);transition:background .3s;}
.rail .seg.on{background:var(--accent);}
.steplabel{padding:10px 24px 0;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.cardbody{padding:18px 24px 24px;}
.step-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin:4px 0 4px;}
.step-sub{font-size:13px;color:var(--muted);margin:0 0 20px;line-height:1.5;}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:500;}
.field{margin-bottom:16px;}
.pwd-wrap{position:relative;}
.pwd-wrap input{padding-right:42px;}
.pwd-toggle{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;border:none;background:transparent;
  color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.pwd-toggle svg{width:18px;height:18px;}
.pwd-toggle.showing{color:var(--accent);}

.spam-warning{
  background:rgba(242,179,61,.1);border:1px solid var(--warn);color:var(--text);
  border-radius:12px;padding:11px 14px;font-size:12px;line-height:1.5;margin-bottom:16px;
}
.symbolic-code-note{font-size:11px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace;}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;}

/* ŞİFRE GÜÇLÜLÜK GÖSTERGESİ */
.strength-row{display:flex;align-items:center;gap:9px;margin-top:8px;}
.strength-bar{flex:1;height:5px;border-radius:4px;background:var(--surface-2);overflow:hidden;}
.strength-fill{height:100%;width:0%;border-radius:4px;background:var(--danger);transition:width .25s ease, background .25s ease;}
.strength-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;min-width:62px;text-align:right;transition:color .25s ease;}
.err{font-size:11.5px;color:var(--danger);margin-top:6px;display:none;}
.codeRow{display:flex;gap:8px;}
.codeRow input{
  flex:1;width:0;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;outline:none;
  text-align:center;font-family:'JetBrains Mono',monospace;font-size:18px;padding:12px 0;
  transition:border-color .2s, background .2s, transform .15s, box-shadow .2s;
}
.codeRow input.filled{border-color:var(--accent-dim);background:rgba(0,149,246,.06);transform:scale(1.06);}
.codeRow input.success{
  border-color:var(--accent);background:rgba(0,149,246,.2);color:var(--accent);
  animation:digitPop .45s ease;box-shadow:0 0 14px rgba(0,149,246,.45);
}
.codeRow input.shake{border-color:var(--danger);animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes digitPop{0%{transform:scale(1);}40%{transform:scale(1.32) rotate(-4deg);}70%{transform:scale(.94) rotate(2deg);}100%{transform:scale(1.06) rotate(0);}}
.verify-check{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:14px;color:var(--accent);font-weight:700;margin-top:16px;opacity:0;
  transform:translateY(10px) scale(.8);transition:opacity .35s, transform .35s;
}
.verify-check.show{opacity:1;transform:translateY(0) scale(1);}
.verify-check .ring{
  width:26px;height:26px;border-radius:50%;background:rgba(0,149,246,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  animation:ringPulse 1.1s ease infinite;
}
.verify-check svg{width:14px;height:14px;}
@keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(0,149,246,.45);}70%{box-shadow:0 0 0 8px rgba(0,149,246,0);}100%{box-shadow:0 0 0 0 rgba(0,149,246,0);}}
.upload-zone{border:1.5px dashed var(--line);border-radius:14px;padding:26px 16px;text-align:center;cursor:pointer;position:relative;}
.upload-zone:hover{border-color:var(--accent-dim);}
.upload-zone.has-img{padding:0;border-style:solid;}
.upload-zone img{width:100%;max-height:260px;object-fit:cover;display:block;border-radius:13px;}
.upload-zone .icon{width:42px;height:42px;margin:0 auto 10px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--accent);}
.upload-zone p{margin:0;font-size:13px;color:var(--muted);}
.accent-text{color:var(--accent);font-weight:600;}
.analysis-box{margin-top:14px;border-radius:12px;padding:14px;font-size:13px;line-height:1.5;display:none;border:1px solid var(--line);}
.analysis-box.loading{display:flex;align-items:center;gap:10px;color:var(--muted);background:var(--surface-2);}
.analysis-box.ok{display:block;background:rgba(0,149,246,.1);border-color:var(--accent);color:var(--accent);}
.analysis-box.bad{display:block;background:rgba(237,73,86,.1);border-color:var(--danger);color:var(--danger);}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--accent);animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.success{text-align:center;padding:10px 0 4px;}
.success h2{font-family:'Space Grotesk',sans-serif;font-size:19px;margin:0 0 6px;}
.success p{color:var(--muted);font-size:13px;margin:0 0 22px;}
input[type=file]{display:none;}

/* NeXT LOGO + ÜST ADA (sağ/sol köşede tema butonları) */
.auth-top-bar{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  padding:18px 16px 10px;gap:8px;
}
.theme-corner-btn{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:var(--surface-2);border:1px solid var(--line);color:var(--muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.theme-corner-btn svg{width:18px;height:18px;}
.theme-corner-btn:active{transform:scale(.92);}
.auth-logo-wrap{display:flex;flex-direction:column;align-items:center;justify-self:center;}
.auth-logo-img{max-width:170px;max-height:64px;object-fit:contain;}
.auth-logo-fallback{display:none;font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.5px;color:var(--text);}
.authpanel{display:none;}
.authpanel.active{display:block;animation:screenIn .25s ease both;}
.auth-switch-link{text-align:center;font-size:12.5px;color:var(--muted);margin-top:16px;cursor:pointer;}
.auth-switch-link b{color:var(--accent);font-weight:600;}

/* SÖZLEŞME METNİ */
.contract-text{margin:0 18px 4px;padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;font-size:12.5px;line-height:1.6;color:var(--text);max-height:220px;overflow-y:auto;}

/* TOAST (alttan çıkan sistem mesajı) */
.toast{
  position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--accent-dim);color:var(--accent);
  padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:600;
  opacity:0;transition:opacity .35s, transform .35s;z-index:90;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.35);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* AÇILIŞ SPLASH (NeXT logosu kısa süre görünüp kaybolur) */
.app-splash{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
  z-index:200;transition:opacity .5s ease;
}
.app-splash.hide{opacity:0;pointer-events:none;}
.app-splash img{max-width:170px;max-height:90px;object-fit:contain;animation:splashPulse 1.1s ease;}
.app-splash .splash-fallback{display:none;font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:var(--text);animation:splashPulse 1.1s ease;}
@keyframes splashPulse{0%{opacity:0;transform:scale(.92);}40%{opacity:1;transform:scale(1);}100%{opacity:1;transform:scale(1);}}

/* EKRAN GEÇİŞ ANİMASYONU (her sekme kendi sayfası gibi açılsın) */
.screen{display:none;position:absolute;inset:0;flex-direction:column;opacity:0;}
.screen.active{display:flex;animation:screenIn .28s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Her ekranın SABİT üst başlığı + kendi içinde bağımsız kayan gövdesi */
.screen-header{
  position:absolute;top:14px;left:14px;right:14px;z-index:40;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--glass-border);border-radius:999px;
  box-shadow:0 8px 28px rgba(0,0,0,.18);
}
.screen-body{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:86px;padding-bottom:100px;}

/* ===== FEED SCREEN (siteye özgü tasarım) ===== */
.topbar{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:0;font-weight:600;letter-spacing:.2px;}
.topbar .icons{display:flex;align-items:center;gap:16px;}
.topbar .icons svg{width:22px;height:22px;color:var(--muted);cursor:pointer;}
.avatar-sm{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--line);}

.feed{padding:24px;max-width:680px;margin:0 auto;}
.post{background:var(--surface);border:1px solid var(--line);border-radius:20px;margin-bottom:24px;overflow:hidden;}
.post-head{display:flex;align-items:center;gap:11px;padding:16px 18px;}
.post-head img{width:38px;height:38px;border-radius:50%;object-fit:cover;}
.post-head .who{font-size:14.5px;font-weight:600;}
.post-head .loc{font-size:11px;color:var(--muted);}
.post-head .dots{margin-left:auto;color:var(--muted);cursor:pointer;font-size:18px;}
.post-media{width:100%;aspect-ratio:4/3;background:var(--surface-2);overflow:hidden;position:relative;}
.post-media img,.post-media video{width:100%;height:100%;object-fit:cover;display:block;}

.ig-actions{display:flex;align-items:center;padding:14px 18px 4px;gap:18px;border-top:1px solid var(--line);margin-top:0;}
.ig-actions .icon-act{cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;font-size:12.5px;transition:color .15s, transform .15s;}
.ig-actions .icon-act:hover{color:var(--text);}
.ig-actions .icon-act svg{width:21px;height:21px;}
.ig-actions .icon-act.liked{color:var(--like-color);}
.ig-actions .icon-act.liked svg{fill:var(--like-color);}
.ig-actions .icon-act.saved svg{fill:var(--accent);color:var(--accent);}
.ig-actions .icon-act:active{transform:scale(1.15);}
.ig-actions .spacer{flex:1;}

.like-count{padding:10px 18px 0;font-size:13.5px;font-weight:600;color:var(--accent);}
.caption{padding:6px 18px 0;font-size:13.5px;line-height:1.5;}
.caption b{font-weight:600;margin-right:6px;}
.view-comments{padding:6px 18px 0;font-size:12.5px;color:var(--muted);cursor:pointer;}
.post-timestamp{padding:6px 18px 16px;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}

.commentsList{padding:4px 18px 0;display:flex;flex-direction:column;gap:3px;}
.commentsList .comment-line{font-size:12.5px;line-height:1.4;}
.commentsList .comment-line b{font-weight:600;margin-right:5px;}
.comment-compose{display:none;padding:10px 18px 14px;gap:8px;}
.comment-compose.show{display:flex;}
.comment-compose input{flex:1;background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:20px;padding:9px 14px;font-size:13px;outline:none;}
.comment-compose input:focus{border-color:var(--accent);}
.comment-send-btn{
  background:var(--accent);color:#06140d;border:none;border-radius:50%;
  width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.comment-send-btn svg{width:15px;height:15px;}
.comment-send-btn:active{transform:scale(.92);}

.emoji-row{display:flex;gap:8px;padding:0 18px 8px;}
.emoji-row button{
  background:var(--surface-2);border:1px solid var(--line);border-radius:50%;
  width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease, background .12s ease;
}
.emoji-row button:active{transform:scale(1.2);background:var(--accent-dim);}

.share-option{
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  padding:13px 16px;border-radius:11px;font-size:13.5px;text-align:left;cursor:pointer;font-family:'Inter',sans-serif;
}
