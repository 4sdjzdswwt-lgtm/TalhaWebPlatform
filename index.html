<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha Web Platform - Giriş</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="container" id="authContainer">
        <div class="abajur-container sidebar-mode" id="mainLamp" onclick="pullLampChain()">
            <div class="lamp-shade">
                <div class="lamp-bulb"></div>
            </div>
            <div class="lamp-chain-wrapper">
                <div class="lamp-chain"></div>
                <div class="lamp-bead"></div>
            </div>
            <div class="lamp-pole"></div>
            <div class="lamp-base"></div>
        </div>

        <div class="controls-corner">
            <button class="lang-toggle-corner" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span class="lang-lbl">EN</span></button>
            <button class="theme-toggle-corner" onclick="toggleTheme()">🌙</button>
        </div>

        <div id="startStep">
            <div class="header-row">
                <h1 id="txtStartTitle">Talha Web Design</h1>
            </div>
            <div class="logo-wrapper-large">
                <img src="beyaz_logo.PNG" class="logo-large site-logo-element" id="siteLogo" alt="Logo">
            </div>
            <div class="hero-description" id="txtHeroDesc">
                Hoş geldiniz, geleceğin web sitesine. Lütfen abajuru açtıktan sonra hesabınız yoksa kaydolun varsa giriş yapınız.
            </div>
        </div>

        <div id="loginStep" style="display: none;">
            <img id="mainEmoji" class="emoji-gif" src="IMG_1553.jpeg" alt="Emoji">
            
            <div class="input-group">
                <label id="lblEmail">E-posta Adresi</label>
                <div class="input-wrapper">
                    <input type="email" id="loginEmail" placeholder="E-posta adresini gir...">
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
            </div>
            <div class="input-group">
                <label id="lblPass">Şifre</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="Şifreni gir...">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)"><i class="fa-solid fa-eye-slash"></i></button>
                </div>
            </div>
            <button class="btn btn-primary" id="btnLogin" onclick="handleLogin()">Giriş Yap</button>
            <div class="switch-text" id="txtNoAccount">Hesabın yok mu? <span onclick="switchStep('registerStep')">Kayıt Ol</span></div>
        </div>

        <div id="registerStep" style="display: none;">
            <img class="emoji-gif" src="IMG_1553.jpeg" alt="Emoji">
            <div class="input-group">
                <label id="lblRegUsername">Kullanıcı Adı</label>
                <div class="input-wrapper">
                    <input type="text" id="regUsername" placeholder="Bir kullanıcı adı belirle..." autocomplete="off">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>
            <div class="input-group">
                <label id="lblRegEmail">E-posta Adresi</label>
                <div class="input-wrapper">
                    <input type="email" id="regEmail" placeholder="E-posta adresini gir...">
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
            </div>
            <div class="input-group">
                <label id="lblRegPass">Şifre</label>
                <div class="input-wrapper">
                    <input type="password" id="regPassword" placeholder="Güçlü bir şifre belirle...">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('regPassword', this)"><i class="fa-solid fa-eye-slash"></i></button>
                </div>
            </div>
            <button class="btn btn-secondary" id="btnRegister" onclick="handleRegister()">Kayıt Ol ve Kod Gönder</button>
            <div class="switch-text" id="txtHaveAccount">Zaten hesabın var mı? <span onclick="switchStep('loginStep')">Giriş Yap</span></div>
        </div>

        <div id="verificationStep" style="display: none;">
            <div class="logo-wrapper-large">
                <img src="IMG_1620.GIF" class="logo-large" alt="Success">
            </div>
            <h1 id="txtVerifyTitle">E-posta Doğrulama</h1>
            <div class="hero-description" id="txtVerifyDesc">
                Lütfen e-posta adresinize gönderilen 6 haneli doğrulama kodunu giriniz.
            </div>
            <div class="input-group">
                <label id="lblCode">Doğrulama Kodu</label>
                <input type="text" id="verificationCode" placeholder="6 Haneli Kod" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
            </div>
            <button class="btn btn-primary" id="btnVerifyCode" onclick="handleVerifyCode()">Kodu Doğrula</button>
        </div>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
