<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha Web Platform - Giriş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>talhaweb</h1>
            <h2>Giriş Yap</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Giriş Yap</button>
                <button type="button" class="create-account-btn" id="register-btn">Yeni Hesap Oluştur</button>
                
                <button type="button" id="google-btn" style="background-color: #ffffff; color: #757575; border: 1px solid #ddd; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;" class="login-btn">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" width="18" height="18">
                    Google ile Giriş Yap
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Konsolundan aldığımız sizin projenize özel bilgiler
        const firebaseConfig = {
            apiKey: "AIzaSyCsGmCLBb0cqpnHrcn66PIHhIr5RSaRSFY",
            authDomain: "talhaweb-c5e40.firebaseapp.com",
            projectId: "talhaweb-c5e40",
            storageBucket: "talhaweb-c5e40.firebasestorage.app",
            messagingSenderId: "286141336960",
            appId: "1:286141336960:web:92e80c38865665d6b80565",
            measurementId: "G-T5147XWHL5"
        };

        // Firebase'i Sistemde Başlatıyoruz
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const googleBtn = document.getElementById('google-btn');

        // 1. E-POSTA VE ŞİFRE İLE GİRİŞ YAPMA
        if(loginBtn) {
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const email = emailInput.value;
                const password = passwordInput.value;

                if(!email || !password) {
                    alert("Lütfen tüm alanları doldurun!");
                    return;
                }

                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("Başarıyla giriş yapıldı!");
                        window.location.href = "feed.html"; // Giriş başarılıysa feed sayfasına yönlendirir
                    })
                    .catch((error) => {
                        alert("Giriş hatası: " + error.message);
                    });
            });
        }

        // 2. E-POSTA VE ŞİFRE İLE KAYIT OLMA (YENİ HESAP)
        if(registerBtn) {
            registerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const email = emailInput.value;
                const password = passwordInput.value;

                if(!email || !password) {
                    alert("Kayıt için e-posta ve şifre girmeniz gerekmektedir!");
                    return;
                }
                if(password.length < 6) {
                    alert("Güvenliğiniz için şifre en az 6 karakter olmalıdır!");
                    return;
                }

                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("Hesabınız başarıyla oluşturuldu! Şimdi bilgilerinizle Giriş Yap butonuna tıklayarak sisteme girebilirsiniz.");
                    })
                    .catch((error) => {
                        alert("Kayıt olma hatası: " + error.message);
                    });
            });
        }

        // 3. GOOGLE HESABI İLE GİRİŞ YAPMA
        if(googleBtn) {
            googleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                signInWithPopup(auth, provider)
                    .then((result) => {
                        alert("Google ile başarıyla oturum açıldı!");
                        window.location.href = "feed.html";
                    })
                    .catch((error) => {
                        alert("Google bağlantı hatası: " + error.message);
                    });
            });
        }
    </script>
</body>
</html>
