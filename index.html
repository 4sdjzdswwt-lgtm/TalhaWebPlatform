<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha Web Platform - Giriş</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="video-bg-layer" id="videoBgLayer"></div>
    <div class="gif-bg-layer" id="gifBgLayer"></div>
    <div class="color-bg-overlay" id="colorBgOverlay"></div>

    <div class="top-control-bar">
        <button id="langToggleBtn" onclick="toggleLanguage()">EN</button>
        <button id="themeToggleBtn" onclick="nextTheme()"><i class="fa-solid fa-palette"></i></button>
    </div>

    <div id="statusMessageBox" class="status-msg-box"></div>

    <div class="lamp-container">
        <div class="lamp-rope-trigger" onclick="pullLampChain()">
            <div class="rope-line"></div>
            <div class="rope-handle"></div>
        </div>
    </div>

    <div class="auth-master-container">
        
        <div id="startStep" class="step-card visible">
            <h1 class="hero-title">talhaweb</h1>
            <p id="heroDescription" class="hero-subtitle">Hoş geldiniz, geleceğin web sitesine. Lütfen abajuru açtıktan sonra hesabınız yoksa kaydolun varsa giriş yapınız.</p>
        </div>

        <div id="loginStep" class="step-card" style="display: none;">
            <h2 class="step-title">Giriş Yap</h2>
            <form class="auth-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <input type="email" id="loginEmail" placeholder="E-posta Adresi" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" placeholder="Şifre" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                
                <button type="button" onclick="handleLogin()" class="btn btn-primary">Giriş Yap</button>
                
                <button type="button" onclick="handleGoogleLogin()" class="btn btn-secondary" style="background: #ffffff; color: #18191a; border: 1px solid #ddd; margin-top: 10px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16" style="vertical-align: middle; margin-right: 8px;"> Google ile Giriş Yap
                </button>
                
                <div class="step-footer-links">
                    <span onclick="switchStep('registerStep')">Hesabınız yok mu? <b>Kaydolun</b></span>
                </div>
            </form>
        </div>

        <div id="registerStep" class="step-card" style="display: none;">
            <h2 class="step-title">Hesap Oluştur</h2>
            <form class="auth-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <input type="text" id="regUsername" placeholder="Kullanıcı Adı" required>
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
                <div class="input-wrapper">
                    <input type="email" id="regEmail" placeholder="E-posta Adresi" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="regPassword" placeholder="Şifre" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('regPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
                
                <button type="button" onclick="handleRegister()" class="btn btn-secondary">Kayıt Ol</button>
                
                <button type="button" onclick="handleGoogleLogin()" class="btn btn-secondary" style="background: #ffffff; color: #18191a; border: 1px solid #ddd; margin-top: 10px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16" style="vertical-align: middle; margin-right: 8px;"> Google ile Kaydol
                </button>
                
                <div class="step-footer-links">
                    <span onclick="switchStep('loginStep')">Zaten üye misiniz? <b>Giriş Yapın</b></span>
                </div>
            </form>
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        function pullLampChain() {
            const body = document.body;
            const startStep = document.getElementById('startStep');
            const loginStep = document.getElementById('loginStep');
            const registerStep = document.getElementById('registerStep');

            isLampOn = !isLampOn;

            if (isLampOn) {
                body.classList.add('light-on');
                if(startStep && loginStep) {
                    startStep.style.display = 'none';
                    loginStep.style.display = 'block';
                }
            } else {
                body.classList.remove('light-on');
                if(startStep) startStep.style.display = 'block';
                if(loginStep) loginStep.style.display = 'none';
                if(registerStep) registerStep.style.display = 'none';
            }
        }

        function switchStep(stepId) {
            document.getElementById('loginStep').style.display = 'none';
            document.getElementById('registerStep').style.display = 'none';
            document.getElementById(stepId).style.display = 'block';
        }

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }
    </script>
</body>
</html>
