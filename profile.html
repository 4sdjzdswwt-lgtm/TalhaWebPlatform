<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha Web Platform - Profilim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div class="top-navigation-bar">
        <div class="nav-links-left">
            <a href="feed.html" class="nav-icon-link"><i class="fa-solid fa-house"></i></a>
            <a href="messages.html" class="nav-icon-link"><i class="fa-solid fa-paper-plane"></i></a>
            <a href="profile.html" class="nav-icon-link" style="color: var(--btn-primary);"><i class="fa-solid fa-user"></i></a>
            <a href="admin.html" id="navAdminLink" class="nav-icon-link" style="display: none;"><i class="fa-solid fa-lock"></i></a>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="theme-toggle-corner" onclick="toggleThemeOnly()" style="position: static;">🌙</button>
            <button onclick="handleLogout()" style="background: none; border: none; color: var(--btn-danger); cursor: pointer; font-size: 1.1rem;"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <div class="container">
        <h1 style="margin-bottom: 25px;">Profilini Düzenle</h1>

        <div style="position: relative; width: 110px; height: 110px; margin: 0 auto 25px auto;">
            <img id="profileAvatarPreview" src="58873-milkbear.gif" style="width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--btn-primary); background: #fff;" alt="Avatar">
            
            <input type="file" id="avatarFileInput" accept="image/*" style="display: none;" onchange="uploadProfileAvatar()">
            
            <button onclick="document.getElementById('avatarFileInput').click()" style="position: absolute; bottom: 0; right: 0; background: var(--btn-primary); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
                <i class="fa-solid fa-camera" style="font-size: 0.85rem;"></i>
            </button>
        </div>
        <div id="avatarUploadStatus" style="font-size: 12px; color: var(--btn-secondary); margin-top: -15px; margin-bottom: 15px;"></div>

        <div class="input-group">
            <label>Kullanıcı Adı</label>
            <div class="input-wrapper">
                <input type="text" id="profileUsername" placeholder="Kullanıcı adın">
                <i class="fa-solid fa-user input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label>E-posta Adresi (Değiştirilemez)</label>
            <div class="input-wrapper">
                <input type="email" id="profileEmail" disabled style="opacity: 0.6; cursor: not-allowed;">
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Yeni Şifre</label>
            <div class="input-wrapper">
                <input type="password" id="profilePassword" placeholder="Yeni şifrenizi girin">
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('profilePassword', this)"><i class="fa-solid fa-eye-slash"></i></button>
            </div>
        </div>

        <button class="btn btn-primary" onclick="updateProfileSettings()">Değişiklikleri Kaydet</button>
        
        <div id="profileStatusMsg" class="status-msg"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://chat-ee35e-default-rtdb.europe-west1.firebasedatabase.app/",
            storageBucket: "chat-ee35e.appspot.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const database = firebase.database();
        const storage = firebase.storage();

        const currentUserEmail = sessionStorage.getItem('active_user_email');
        const cleanUserEmail = currentUserEmail ? currentUserEmail.toLowerCase().replace('.', '_') : null;

        if(!currentUserEmail) window.location.href = 'index.html';

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            loadUserData();
        });

        function toggleThemeOnly() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            document.querySelector('.theme-toggle-corner').textContent = (newTheme === 'light') ? '☀️' : '🌙';
        }

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye-slash';
            }
        }

        function handleLogout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // MEVCUT KULLANICI BİLGİLERİNİ FORMA ÇEKME
        function loadUserData() {
            database.ref(`users/${cleanUserEmail}`).once('value', snapshot => {
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    document.getElementById('profileUsername').value = userData.username;
                    document.getElementById('profileEmail').value = userData.email;
                    document.getElementById('profilePassword').value = userData.password;
                    
                    if(userData.avatar) {
                        document.getElementById('profileAvatarPreview').src = userData.avatar;
                    }
                    
                    // Admin menü yetki kontrolü
                    if(userData.role === 'admin') {
                        document.getElementById('navAdminLink').style.display = 'block';
                    }
                }
            });
        }

        // FOTOĞRAF SEÇİLDİĞİNDE GECİKMEDEN STORAGE'A YÜKLEME MOTORU
        function uploadProfileAvatar() {
            const file = document.getElementById('avatarFileInput').files[0];
            const statusLabel = document.getElementById('avatarUploadStatus');
            if(!file) return;

            statusLabel.textContent = "Fotoğraf yükleniyor...";

            const fileRef = storage.ref(`avatars/${cleanUserEmail}_avatar`);
            fileRef.put(file).then(snapshot => {
                snapshot.ref.getDownloadURL().then(downloadURL => {
                    // Veritabanındaki avatar linkini güncelle
                    database.ref(`users/${cleanUserEmail}/avatar`).set(downloadURL).then(() => {
                        document.getElementById('profileAvatarPreview').src = downloadURL;
                        statusLabel.textContent = "Profil resmi başarıyla güncellendi!";
                        
                        // Genel akıştaki isim-avatar uyumu için session'ı da tazele
                        sessionStorage.setItem('active_user_avatar', downloadURL);
                    });
                });
            }).catch(err => {
                statusLabel.textContent = "Yükleme başarısız: " + err.message;
            });
        }

        // METİNSEL BİLGİLERİ (KULLANICI ADI, ŞİFRE) GÜNCELLEME
        function updateProfileSettings() {
            const newUsername = document.getElementById('profileUsername').value.trim();
            const newPassword = document.getElementById('profilePassword').value.trim();
            const msgBox = document.getElementById('profileStatusMsg');

            if(!newUsername || !newPassword) {
                msgBox.textContent = "Alanlar boş bırakılamaz!";
                msgBox.style.color = "#ff4d4d";
                return;
            }

            msgBox.textContent = "Güncelleniyor...";
            msgBox.style.color = "#ff9f43";

            // Güncelleme paketini veritabanına gönder
            database.ref(`users/${cleanUserEmail}`).update({
                username: newUsername,
                password: newPassword
            }).then(() => {
                sessionStorage.setItem('active_user_name', newUsername);
                msgBox.textContent = "Profil bilgileri başarıyla güncellendi!";
                msgBox.style.color = "#28a745";
            }).catch(err => {
                msgBox.textContent = "Hata: " + err.message;
                msgBox.style.color = "#ff4d4d";
            });
        }
    </script>
</body>
</html>
