<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha Web Platform - Ana Akış</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sağ üst köşedeki Çıkış butonu tasarımı */
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <button id="logout-btn" class="logout-btn">Oturumu Kapat</button>

    <div class="feed-container" style="text-align: center; margin-top: 100px;">
        <h1>Talha Web Platform'a Hoş Geldiniz!</h1>
        <p>Giriş başarıyla doğrulandı. Burası uygulamanızın ana akış (feed) ekranıdır.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsGmCLBb0cqpnHrcn66PIHhIr5RSaRSFY",
            authDomain: "talhaweb-c5e40.firebaseapp.com",
            projectId: "talhaweb-c5e40",
            storageBucket: "talhaweb-c5e40.firebasestorage.app",
            messagingSenderId: "286141336960",
            appId: "1:286141336960:web:92e80c38865665d6b80565",
            measurementId: "G-T5147XWHL5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // KORUMA: Eğer kullanıcı giriş yapmadıysa zorunlu olarak index.html'e geri fırlatır
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            }
        });

        // ÇIKIŞ YAPMA İŞLEMİ
        const logoutBtn = document.getElementById('logout-btn');
        if(logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                signOut(auth).then(() => {
                    alert("Güvenli bir şekilde çıkış yapıldı.");
                    window.location.href = "index.html";
                });
            });
        }
    </script>
</body>
</html>
